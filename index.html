<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Checker</title>

  <style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#141e30,#243b55);
  padding:20px;
}

.container{
  width:100%;
  max-width:420px;
  background:#ffffff;
  padding:30px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
  text-align:center;
  margin-bottom:25px;
  color:#222;
}

.input-box{
  position:relative;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:14px 70px 14px 14px;
  border:2px solid #ccc;
  border-radius:10px;
  font-size:16px;
  outline:none;
  transition:0.3s;
}

input:focus{
  border-color:#243b55;
}

.toggle-btn{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#243b55;
  color:white;
  cursor:pointer;
}

.progress{
  width:100%;
  height:10px;
  background:#ddd;
  border-radius:20px;
  overflow:hidden;
  margin-top:15px;
}

#strengthBar{
  height:100%;
  width:0%;
  border-radius:20px;
  transition:0.4s;
}

.strength{
  text-align:center;
  font-size:20px;
  font-weight:bold;
  margin-top:15px;
}

.weak{
  color:red;
}

.medium{
  color:orange;
}

.strong{
  color:green;
}

.suggestions{
  margin-top:25px;
  background:#f5f5f5;
  padding:18px;
  border-radius:12px;
}

.suggestions h3{
  margin-bottom:12px;
}

.suggestions li{
  margin:8px 0;
  color:#555;
}

.generate-btn,
.copy-btn{
  width:100%;
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:10px;
  color:white;
  font-size:15px;
  cursor:pointer;
}

.generate-btn{
  background:#243b55;
}

.copy-btn{
  background:#28a745;
}

.generate-btn:hover{
  background:#141e30;
}

.copy-btn:hover{
  background:#1e7e34;
}

@media(max-width:500px){

  .container{
    padding:20px;
  }

}

  </style>
</head>

<body>

  <div class="container">

    <h2>Password Strength Checker</h2>

    <div class="input-box">

      <input
        type="password"
        id="password"
        placeholder="Enter your password"
        onkeyup="checkPassword()"
      >

      <button class="toggle-btn" onclick="togglePassword()">
        Show
      </button>

    </div>

    <div class="progress">
      <div id="strengthBar"></div>
    </div>

    <div id="strengthMessage" class="strength"></div>

    <div class="suggestions">

      <h3>Suggestions to Improve Password:</h3>

      <ul id="tips">
        <li>Start typing your password...</li>
      </ul>

    </div>

    <button class="generate-btn" onclick="generatePassword()">
      Generate Strong Password
    </button>

    <button class="copy-btn" onclick="copyPassword()">
      Copy Password
    </button>

  </div>

  <script>

function togglePassword(){

  let password = document.getElementById("password");
  let button = document.querySelector(".toggle-btn");

  if(password.type === "password"){

    password.type = "text";
    button.innerHTML = "Hide";

  }
  else{

    password.type = "password";
    button.innerHTML = "Show";

  }
}

function checkPassword(){

  let password = document.getElementById("password").value;
  let strengthMessage = document.getElementById("strengthMessage");
  let tips = document.getElementById("tips");
  let bar = document.getElementById("strengthBar");

  let strength = 0;
  let suggestions = [];

  // Length
  if(password.length >= 8){
    strength++;
  }
  else{
    suggestions.push("Add at least 8 characters");
  }

  // Uppercase
  if(/[A-Z]/.test(password)){
    strength++;
  }
  else{
    suggestions.push("Include an uppercase letter");
  }

  // Lowercase
  if(/[a-z]/.test(password)){
    strength++;
  }
  else{
    suggestions.push("Include a lowercase letter");
  }

  // Number
  if(/[0-9]/.test(password)){
    strength++;
  }
  else{
    suggestions.push("Add at least one number");
  }

  // Special Character
  if(/[^A-Za-z0-9]/.test(password)){
    strength++;
  }
  else{
    suggestions.push("Add a special character");
  }

  // Empty Password
  if(password.length === 0){

    strengthMessage.innerHTML = "";
    tips.innerHTML = "<li>Start typing your password...</li>";

    bar.style.width = "0%";

    return;
  }

  // Weak
  if(strength <= 2){

    strengthMessage.innerHTML = "Weak Password";
    strengthMessage.className = "strength weak";

    bar.style.width = "33%";
    bar.style.background = "red";
  }

  // Medium
  else if(strength <= 4){

    strengthMessage.innerHTML = "Medium Password";
    strengthMessage.className = "strength medium";

    bar.style.width = "66%";
    bar.style.background = "orange";
  }

  // Strong
  else{

    strengthMessage.innerHTML = "Strong Password";
    strengthMessage.className = "strength strong";

    bar.style.width = "100%";
    bar.style.background = "green";
  }

  // Suggestions
  if(suggestions.length > 0){

    tips.innerHTML = suggestions.map(
      tip => `<li>${tip}</li>`
    ).join("");

  }
  else{

    tips.innerHTML = "<li>Your password is very strong ✔</li>";

  }
}

function generatePassword(){

  let chars =
  "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%";

  let generated = "";

  for(let i = 0; i < 12; i++){

    generated += chars.charAt(
      Math.floor(Math.random() * chars.length)
    );

  }

  document.getElementById("password").value = generated;

  checkPassword();
}

function copyPassword(){

  let password = document.getElementById("password").value;

  navigator.clipboard.writeText(password);

  alert("Password copied!");
}

  </script>

</body>
</html>
