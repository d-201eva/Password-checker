<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Checker</title>
<style>
 *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Segoe UI", sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  padding:20px;
  color:white;
}

/* =========================
   MAIN CONTAINER
========================= */

.container{
  width:100%;
  max-width:430px;
  background:#111827;
  border:1px solid #2d3748;
  padding:35px;
  box-shadow:0 0 25px rgba(0,0,0,0.45);
}

/* =========================
   TITLE
========================= */

h2{
  text-align:center;
  margin-bottom:30px;
  color:#f8fafc;
  font-size:28px;
  font-weight:600;
  letter-spacing:1px;
}

/* =========================
   INPUT SECTION
========================= */

.input-box{
  position:relative;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:15px 85px 15px 15px;
  background:#1e293b;
  border:1px solid #334155;
  color:white;
  font-size:15px;
  outline:none;
  transition:0.3s ease;
}

input::placeholder{
  color:#94a3b8;
}

input:focus{
  border-color:#3b82f6;
  box-shadow:0 0 10px rgba(59,130,246,0.4);
}

/* =========================
   SHOW BUTTON
========================= */

.toggle-btn{
  position:absolute;
  right:8px;
  top:50%;
  transform:translateY(-50%);
  padding:8px 14px;
  border:none;
  background:#2563eb;
  color:white;
  font-size:13px;
  cursor:pointer;
  transition:0.3s ease;
}

.toggle-btn:hover{
  background:#1d4ed8;
}

/* =========================
   PROGRESS BAR
========================= */

.progress{
  width:100%;
  height:8px;
  background:#1e293b;
  overflow:hidden;
  margin-top:18px;
}

#strengthBar{
  height:100%;
  width:0%;
  transition:0.4s ease;
}

/* =========================
   STRENGTH TEXT
========================= */

.strength{
  text-align:center;
  margin-top:18px;
  font-size:18px;
  font-weight:600;
}

.weak{
  color:#ef4444;
}

.medium{
  color:#f59e0b;
}

.strong{
  color:#22c55e;
}

/* =========================
   SUGGESTION BOX
========================= */

.suggestions{
  margin-top:28px;
  background:#1e293b;
  border:1px solid #334155;
  padding:18px;
}

.suggestions h3{
  margin-bottom:14px;
  font-size:16px;
  color:#f8fafc;
  font-weight:500;
}

.suggestions ul{
  padding-left:18px;
}

.suggestions li{
  margin:10px 0;
  color:#cbd5e1;
  font-size:14px;
  line-height:1.5;
}

/* =========================
   BUTTONS
========================= */

.generate-btn,
.copy-btn{
  width:100%;
  margin-top:16px;
  padding:14px;
  border:none;
  font-size:15px;
  font-weight:500;
  cursor:pointer;
  transition:0.3s ease;
}

.generate-btn{
  background:#2563eb;
  color:white;
}

.generate-btn:hover{
  background:#1d4ed8;
}

.copy-btn{
  background:#16a34a;
  color:white;
}

.copy-btn:hover{
  background:#15803d;
}

/* =========================
   RESPONSIVE DESIGN
========================= */

@media(max-width:500px){

  .container{
    padding:25px;
  }

  h2{
    font-size:24px;
  }

}
</style>
</head>

<body>

  <div class="container">

    <h2>Password Strength Checker</h2>

    <div class="input-box">

      <input
        type="password"
        id="password"
        placeholder="Enter your password"
        onkeyup="checkPassword()"
      >

      <button class="toggle-btn" onclick="togglePassword()">
        Show
      </button>

    </div>

    <div class="progress">
      <div id="strengthBar"></div>
    </div>

    <div id="strengthMessage" class="strength"></div>

    <div class="suggestions">

      <h3>Suggestions to Improve Password:</h3>

      <ul id="tips">
        <li>Start typing your password...</li>
      </ul>

    </div>

    <button class="generate-btn" onclick="generatePassword()">
      Generate Strong Password
    </button>

    <button class="copy-btn" onclick="copyPassword()">
      Copy Password
    </button>

  </div>

  <script>

function togglePassword(){

  let password = document.getElementById("password");
  let button = document.querySelector(".toggle-btn");

  if(password.type === "password"){

    password.type = "text";
    button.innerHTML = "Hide";

  }
  else{

    password.type = "password";
    button.innerHTML = "Show";

  }
}

function checkPassword(){

  let password = document.getElementById("password").value;
  let strengthMessage = document.getElementById("strengthMessage");
  let tips = document.getElementById("tips");
  let bar = document.getElementById("strengthBar");

  let strength = 0;
  let suggestions = [];

  // Length
  if(password.length >= 8){
    strength++;
  }
  else{
    suggestions.push("Add at least 8 characters");
  }

  // Uppercase
  if(/[A-Z]/.test(password)){
    strength++;
  }
  else{
    suggestions.push("Include an uppercase letter");
  }

  // Lowercase
  if(/[a-z]/.test(password)){
    strength++;
  }
  else{
    suggestions.push("Include a lowercase letter");
  }

  // Number
  if(/[0-9]/.test(password)){
    strength++;
  }
  else{
    suggestions.push("Add at least one number");
  }

  // Special Character
  if(/[^A-Za-z0-9]/.test(password)){
    strength++;
  }
  else{
    suggestions.push("Add a special character");
  }

  // Empty Password
  if(password.length === 0){

    strengthMessage.innerHTML = "";
    tips.innerHTML = "<li>Start typing your password...</li>";

    bar.style.width = "0%";

    return;
  }

  // Weak
  if(strength <= 2){

    strengthMessage.innerHTML = "Weak Password";
    strengthMessage.className = "strength weak";

    bar.style.width = "33%";
    bar.style.background = "red";
  }

  // Medium
  else if(strength <= 4){

    strengthMessage.innerHTML = "Medium Password";
    strengthMessage.className = "strength medium";

    bar.style.width = "66%";
    bar.style.background = "orange";
  }

  // Strong
  else{

    strengthMessage.innerHTML = "Strong Password";
    strengthMessage.className = "strength strong";

    bar.style.width = "100%";
    bar.style.background = "green";
  }

  // Suggestions
  if(suggestions.length > 0){

    tips.innerHTML = suggestions.map(
      tip => `<li>${tip}</li>`
    ).join("");

  }
  else{

    tips.innerHTML = "<li>Your password is very strong ✔</li>";

  }
}

function generatePassword(){

  let chars =
  "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%";

  let generated = "";

  for(let i = 0; i < 12; i++){

    generated += chars.charAt(
      Math.floor(Math.random() * chars.length)
    );

  }

  document.getElementById("password").value = generated;

  checkPassword();
}

function copyPassword(){

  let password = document.getElementById("password").value;

  navigator.clipboard.writeText(password);

  alert("Password copied!");
}

  </script>

</body>
</html>
